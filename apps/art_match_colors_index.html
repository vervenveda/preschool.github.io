<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Match Game</title>
  <style>
    body {
      font-family: "Comic Sans MS", sans-serif;
      background: linear-gradient(135deg, #ffb347, #ffcc33, #ff5c5c, #0099ff, #66ff66);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      text-align: center;
      padding: 20px;
      color: #fff;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%}
      50% {background-position: 100% 50%}
      100% {background-position: 0% 50%}
    }
    h2 { text-shadow: 2px 2px 5px #333; }
    .controls {
      margin: 15px;
    }
    select, button {
      font-size: 18px;
      margin: 5px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .game-board {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .color-btn {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      border: 4px solid #fff;
      cursor: pointer;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      background: lightgray;
      transition: transform 0.2s;
    }
    .color-btn:hover { transform: scale(1.05); }
    #message {
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>🎨 Match the Colors! 🌈</h2>
  <div class="controls">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
      <option value="easy">Easy (2 colors)</option>
      <option value="medium" selected>Medium (4 colors)</option>
      <option value="hard">Hard (6 colors)</option>
    </select>
    <button onclick="startGame()">Play Again</button>
    <button onclick="toggleSound()">🔊 Toggle Sound</button>
  </div>
  <div class="game-board" id="board"></div>
  <div id="message"></div>

  <!-- Sound effects -->
  <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="failSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

  <script>
    let colorsBase = ["red","blue","yellow","green","orange","purple"];
    let cards = [];
    let firstPick = null;
    let lockBoard = false;
    let soundOn = true;

    const board = document.getElementById("board");
    const successSound = document.getElementById("successSound");
    const failSound = document.getElementById("failSound");
    const message = document.getElementById("message");

    function startGame() {
      board.innerHTML = "";
      message.textContent = "";
      firstPick = null;
      lockBoard = false;

      let difficulty = document.getElementById("difficulty").value;
      let colors = [];
      if (difficulty === "easy") colors = colorsBase.slice(0,2);
      if (difficulty === "medium") colors = colorsBase.slice(0,4);
      if (difficulty === "hard") colors = colorsBase.slice(0,6);

      cards = [...colors, ...colors];
      cards.sort(() => 0.5 - Math.random());

      cards.forEach(color => {
        const btn = document.createElement("div");
        btn.className = "color-btn";
        btn.dataset.color = color;
        btn.addEventListener("click", () => flipCard(btn, color));
        board.appendChild(btn);
      });
    }

    function flipCard(card, color) {
      if (lockBoard || card.style.background === color) return;
      card.style.background = color;

      if (!firstPick) {
        firstPick = card;
      } else {
        if (firstPick.dataset.color === color) {
          if (soundOn) successSound.play();
          message.textContent = "Great match!";
          firstPick = null;
        } else {
          lockBoard = true;
          if (soundOn) failSound.play();
          message.textContent = "Try again!";
          setTimeout(() => {
            card.style.background = "lightgray";
            firstPick.style.background = "lightgray";
            firstPick = null;
            lockBoard = false;
          }, 800);
        }
      }
    }

    function toggleSound() {
      soundOn = !soundOn;
      message.textContent = soundOn ? "Sound ON" : "Sound OFF";
    }

    // auto-start
    startGame();
  </script>
</body>
</html>
