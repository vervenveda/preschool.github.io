<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sunny’s Weather Adventure – PreK & K (v2)</title>
<style>
  :root{
    --card:#fff8e1;
    --brand:#f9a602;
    --ink:#3a3a3a;
    --sky:#b7e4fa;
    --grass:#43a047;
    --panel: 0 11px 33px rgba(0,0,0,.22);
    --soft: 0 6px 22px rgba(0,0,0,.11);
    --ring: 0 0 0 6px #ffe37b90;
  }
  html,body{height:100%;margin:0}
  body{
    font-family: "Comic Sans MS","Chalkboard SE","Poppins",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background: linear-gradient(180deg,#f2f9ff 0%, #fffbe7 100%);
    display:flex;align-items:center;justify-content:center;min-height:111vh;color:var(--ink);
  }
  .container{
    width:100%;max-width:444px;background:var(--card);border-radius:33px;box-shadow:var(--panel);
    padding:22px 22px 22px;text-align:center;position:relative;overflow:hidden
  }
  .header-row{
    display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:11px;position:relative;z-index:5
  }
  .sunny-face{width:66px;height:66px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
    background: radial-gradient(circle,#fff9b1 0%,#ffd34d 55%,#ff9900 100%);box-shadow:0 0 22px #ffd34d80, var(--ring)}
  .sunny-face span{font-size:44px;position:relative;z-index:2}
  .sunny-face .rays{
    position:absolute;inset:-8px;pointer-events:none;border-radius:50%;
    background: repeating-conic-gradient(#ffd34d 0 5deg, transparent 5deg 11deg);
    animation: spin 5s linear infinite;opacity:.9
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{margin:0;font-size:1rem;line-height:1.1;color:var(--brand);letter-spacing:.5px}

  /* Scene */
  .scene{margin:11px auto 11px;width:100%;max-width:411px;height:222px;border-radius:22px;box-shadow:0 4px 22px #c0e3fc70;
    background: linear-gradient(188deg, var(--sky) 0%, #c5fad1 100%);position:relative;overflow:hidden;transition:background 800ms ease}
  .scene .ground{
    position:absolute;left:0;right:0;bottom:0;height:55px;background:linear-gradient(188deg,#82ca6b 0%, var(--grass) 100%);
    border-top-left-radius:88px 33px;border-top-right-radius:88px 33px;z-index:2
  }
  /* Scene themes */
  .scene.sun{background:linear-gradient(180deg,#fff7b0 0%,#ffe6a7 100%)}
  .scene.rain{background:linear-gradient(180deg,#a3d8ff 0%,#b9e5ff 100%)}
  .scene.snow{background:linear-gradient(188deg,#eaf6ff 0%,#c5fad1 100%)}
  .scene.cloud{background:linear-gradient(199deg,#e0e4f7 0%,#d3deea 100%)}
  .scene.wind{background:linear-gradient(200deg,#c7f6ff 0%,#d8fff1 100%)}
  .scene.storm{background:linear-gradient(222deg,#4f5867 0%,#959db8 100%)}
  .scene.rainbow{background:linear-gradient(180deg,#ffecd2 0%,#fcb69f 100%)}
  .scene.fog{background:linear-gradient(111deg,#f5f6f7 0%,#e3e6e8 100%)}
  .scene.night{background:linear-gradient(180deg,#233659 0%,#0e1637 100%)}

  /* Animated elements */
  .ani-sun{position:absolute;top:24px;left:26px;width:70px;height:70px;border-radius:50%;
    background: radial-gradient(circle,#fff7a8 0%,#ffd34d 60%,#ff9f00 100%);box-shadow:0 0 18px #ffd34d90}
  .ani-cloud{position:absolute;top:33px;width:122px;height:66px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12))}
  .ani-cloud::before,.ani-cloud::after{
    content:"";position:absolute;background:#fff;border-radius:50%
  }
  .ani-cloud::before{left:11px;top:22px;width:55px;height:44px}
  .ani-cloud::after{left:44px;top:11px;width:77px;height:55px}
  .ani-cloud{animation: drift 11s linear infinite}
  @keyframes drift{from{transform:translateX(-44px)}to{transform:translateX(222px)}}

  .ani-raindrop{position:absolute;width:3px;height:14px;background:#2196f3;border-radius:2px;opacity:.9;
    animation: fall var(--fall,1.2s) linear infinite}
  @keyframes fall{from{transform:translateY(-40px)}to{transform:translateY(190px)}}

  .ani-snow{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;opacity:.95;
    animation: snow var(--snow,2.4s) linear infinite}
  @keyframes snow{
    0%{transform:translateY(-30px) translateX(0)}
    50%{transform:translateY(90px) translateX(8px)}
    100%{transform:translateY(190px) translateX(-4px)}
  }

  .ani-gust{position:absolute;left:12px;height:6px;border-radius:6px;background:linear-gradient(90deg,#cfeafc 0%,#b3e5fc 100%);
    opacity:.9;animation: gust 2.6s ease-in-out infinite}
  @keyframes gust{0%{transform:translateX(-30px) scaleX(.7)}50%{transform:translateX(160px) scaleX(1)}100%{transform:translateX(260px) scaleX(.8)}}

  .ani-lightning{
    position:absolute;width:3px;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:40px solid #fffde7;
    filter: drop-shadow(0 0 6px #fff59d);animation: flash 1.8s infinite steps(1)
  }
  @keyframes flash{0%,90%{opacity:0} 92%{opacity:1} 100%{opacity:0}}

  .ani-rainbow{position:absolute;inset:30px 40px auto 40px;height:140px;border-radius:0 0 150px 150px/0 0 120px 120px;overflow:hidden}
  .ani-rainbow::before{
    content:"";position:absolute;inset:0;border-bottom-left-radius:150px 120px;border-bottom-right-radius:150px 120px;
    background: conic-gradient(from 180deg, red,orange,yellow,green,cyan,blue,violet, red)
  }

  .ani-fog{position:absolute;left:0;right:0;height:36px;background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(240,240,240,.85));
    border-radius:16px;filter:blur(1px);animation: fog 5s ease-in-out infinite}
  @keyframes fog{0%{transform:translateX(-12px)}50%{transform:translateX(12px)}100%{transform:translateX(-12px)}}

  .ani-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.7;animation: twinkle var(--tw,.9s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  .ani-moon{position:absolute;top:26px;left:26px;width:60px;height:60px;border-radius:50%;background:#fff8dc;
    box-shadow:0 0 14px rgba(255,255,255,.35)}
  .ani-moon::after{
    content:"";position:absolute;top:-4px;left:14px;width:60px;height:60px;border-radius:50%;background:#e6edf8
  }

  .msg{min-height:44px;margin:6px auto 0;max-width:360px;font-weight:700;color:#5b4b20}
  .encourage{min-height:20px;color:#7a5b9a;font-weight:600;font-size:.95rem}
  .row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin:10px auto}
  .weatherBtn{
    width:48px;height:48px;border:none;border-radius:14px;background:#fff;box-shadow:var(--soft);cursor:pointer;font-size:24px;
    transition: transform .12s ease;display:grid;place-items:center
  }
  .weatherBtn:active{transform:scale(.96)}
  .controls{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin:6px auto 10px
  }
  .pill{
    display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:8px 10px;box-shadow:var(--soft);font-size:.9rem
  }
  .pill input{transform:scale(1.15)}
  .learn-btn{
    appearance:none;border:0;border-radius:999px;background:#ffe082;color:#5b4b20;font-weight:800;
    padding:10px 16px;box-shadow:var(--soft);cursor:pointer
  }
  .footer-link{margin-top:8px;font-size:.9rem}
  .sr{position:absolute;left:-9999px}
  @media (prefers-reduced-motion: reduce){
    .ani-cloud,.sunny-face .rays,.ani-raindrop,.ani-snow,.ani-gust,.ani-lightning,.ani-rainbow,.ani-fog,.ani-star{animation:none}
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header-row" aria-hidden="true">
      <div class="sunny-face"><span>😊</span><div class="rays"></div></div>
      <h1>Sunny’s Weather Adventure</h1>
    </div>

    <div class="scene sun" id="scene" role="img" aria-label="Sunny day with warm sky">
      <div class="ground"></div>
    </div>

    <div id="msg" class="msg" aria-live="polite">Tap a weather picture below!</div>
    <div id="encourage" class="encourage" aria-live="polite"></div>

    <!-- Weather grid -->
    <div class="row" id="buttonsRow" aria-label="Weather choices">
      <button class="weatherBtn" data-weather="sun"     style="background:#fffdb0" aria-label="Sunny">☀️</button>
      <button class="weatherBtn" data-weather="rain"    style="background:#a3d8ff" aria-label="Rainy">🌧️</button>
      <button class="weatherBtn" data-weather="snow"    style="background:#e2e9fa" aria-label="Snowy">❄️</button>
      <button class="weatherBtn" data-weather="cloud"   style="background:#f7f7f7" aria-label="Cloudy">☁️</button>
      <button class="weatherBtn" data-weather="wind"    style="background:#d0f2ff" aria-label="Windy">💨</button>
      <button class="weatherBtn" data-weather="storm"   style="background:#f8dada" aria-label="Storm">⛈️</button>
      <button class="weatherBtn" data-weather="rainbow" style="background:#fddefa" aria-label="Rainbow">🌈</button>
      <button class="weatherBtn" data-weather="fog"     style="background:#f0f0f0" aria-label="Foggy">🌫️</button>
      <button class="weatherBtn" data-weather="night"   style="background:#b0c4ef" aria-label="Night">🌙</button>
    </div>

    <!-- Toggles -->
    <div class="controls">
      <label class="pill"><input type="checkbox" id="autoToggle"> <span>Auto-Read</span></label>
      <label class="pill"><input type="checkbox" id="muteToggle"> <span>Mute Voice</span></label>
      <label class="pill"><input type="checkbox" id="chimeToggle"> <span>Soft Chime</span></label>
    </div>

    <button class="learn-btn" id="learnBtn" type="button">Learn More</button>
    <div class="footer-link">
      Kid-safe resources:
      <a href="https://scijinks.gov/" target="_blank" style="color:#3087ea">NOAA SciJinks</a> ·
      <a href="https://pbskids.org/games/weather/" target="_blank" style="color:#e373b6">PBS Kids Weather</a>
    </div>
    <div class="sr" id="srFact"></div>
  </div>

<script>
(function(){
  const scene = document.getElementById("scene");
  const msg = document.getElementById("msg");
  const encourage = document.getElementById("encourage");
  const learnBtn = document.getElementById("learnBtn");
  const autoToggle = document.getElementById("autoToggle");
  const muteToggle = document.getElementById("muteToggle");
  const chimeToggle = document.getElementById("chimeToggle");
  const srFact = document.getElementById("srFact");

  const encouragements = [
    "Sunny says: Great exploring! 🌞",
    "Sunny says: What’s your favorite weather?",
    "Sunny says: You’re a weather wizard!",
    "Sunny says: Keep learning with me!",
    "Sunny says: High five, sunshine!",
    "Sunny says: You make every day brighter!"
  ];
  const weatherOrder = ["sun","rain","snow","cloud","wind","storm","rainbow","fog","night"];
  let autoIdx = 0, autoTimer = null;

  const weatherText = {
    sun:   {t:"Sunny says: The sun makes our days warm and bright!", fact:"The sun is a big ball of hot gas. It helps plants grow and gives us light."},
    rain:  {t:"Sunny says: Rain helps the flowers and trees drink!", fact:"Raindrops come from clouds and fill up lakes, rivers, and puddles."},
    snow:  {t:"Sunny says: Snowflakes are soft and cold. Each one is special!", fact:"Every snowflake has six sides, and no two are exactly the same."},
    cloud: {t:"Sunny says: Clouds are like fluffy pillows in the sky.", fact:"Clouds are made of tiny water drops floating high up."},
    wind:  {t:"Sunny says: The wind can blow your hat away!", fact:"Wind is moving air. It can be a gentle breeze or very strong."},
    storm: {t:"Sunny says: Thunderstorms are loud. Stay safe inside!", fact:"Lightning flashes before you hear thunder. Storms bring lots of rain."},
    rainbow:{t:"Sunny says: Rainbows show lots of pretty colors!", fact:"Rainbows happen when sunlight shines through raindrops in the sky."},
    fog:   {t:"Sunny says: Fog makes everything look soft and fuzzy.", fact:"Fog is a cloud close to the ground. It feels cool and wet."},
    night: {t:"Sunny says: At night, the moon and stars come out to play!", fact:"The moon doesn’t make its own light. It shines because of the sun!"}
  };

  /* ---------- Persistence for toggles ---------- */
  try{
    const saved = JSON.parse(localStorage.getItem("sunny_toggles")||"{}");
    if (typeof saved.auto==="boolean") autoToggle.checked = saved.auto;
    if (typeof saved.mute==="boolean") muteToggle.checked = saved.mute;
    if (typeof saved.chime==="boolean") chimeToggle.checked = saved.chime;
  }catch{}
  function saveToggles(){
    try{ localStorage.setItem("sunny_toggles", JSON.stringify({auto:autoToggle.checked,mute:muteToggle.checked,chime:chimeToggle.checked})); }catch{}
  }
  autoToggle.addEventListener("change", ()=>{ saveToggles(); handleAuto(); });
  muteToggle.addEventListener("change", ()=>{ saveToggles(); });
  chimeToggle.addEventListener("change", ()=>{ saveToggles(); });

  /* ---------- WebAudio soft chime ---------- */
  function playChime(){
    if (!chimeToggle.checked) return;
    try{
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sine";
      o.frequency.value = 880; // A5
      g.gain.value = 0.0001;
      o.connect(g); g.connect(ctx.destination);
      o.start();
      // gentle attack/decay
      const now = ctx.currentTime;
      g.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
      o.stop(now + 0.5);
    }catch{}
  }

  /* ---------- Speech (gentle voice) ---------- */
function speak(text){
  if (!("speechSynthesis" in window) || muteToggle.checked) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.88;   // slightly slower, more soothing pace
  u.pitch = 1.05;  // lower pitch softens tone
  u.volume = 0.9;  // gentle volume balance
  const voices = speechSynthesis.getVoices();
  u.voice = voices.find(v =>
    /samantha|soft|natural|google us english female|child|microsoft aria|serena|olivia/i.test(v.name)
  ) || voices[0] || null;
  speechSynthesis.cancel();
  window.setTimeout(()=>speechSynthesis.speak(u), 0);
}
  // iOS sometimes needs a getVoices kick:
  if (speechSynthesis && speechSynthesis.onvoiceschanged !== undefined){
    speechSynthesis.onvoiceschanged = ()=>{};
  }

  /* ---------- Scene helpers ---------- */
  function clearScene(){
    [...scene.querySelectorAll(":scope > *")].forEach(el=>{
      if (!el.classList.contains("ground")) el.remove();
    });
  }

  function drawWeather(kind){
    clearScene();
    scene.className = "scene " + kind;

    if (kind==="sun"){
      scene.appendChild(div("ani-sun"));
      // a subtle cloud
      const c = div("ani-cloud"); c.style.left="180px"; scene.appendChild(c);
    }
    if (kind==="rain"){
      for (let i=0;i<18;i++){
        const d = div("ani-raindrop");
        d.style.left = (18 + Math.random()*300) + "px";
        d.style.top = (Math.random()*80) + "px";
        d.style.setProperty("--fall", (0.9 + Math.random()*0.7)+"s");
        scene.appendChild(d);
      }
      const c = div("ani-cloud"); c.style.left="110px"; scene.appendChild(c);
    }
    if (kind==="snow"){
      for (let i=0;i<16;i++){
        const s = div("ani-snow");
        s.style.left = (16 + Math.random()*300) + "px";
        s.style.top = (Math.random()*60) + "px";
        s.style.setProperty("--snow", (1.8 + Math.random()*1.8)+"s");
        scene.appendChild(s);
      }
      const c = div("ani-cloud"); c.style.left="125px"; scene.appendChild(c);
    }
    if (kind==="cloud"){
      const c1 = div("ani-cloud"); c1.style.left="40px";
      const c2 = div("ani-cloud"); c2.style.left="150px";
      scene.append(c1,c2);
    }
    if (kind==="wind"){
      for (let i=0;i<3;i++){
        const g = div("ani-gust");
        g.style.top = (70 + i*24) + "px";
        g.style.width = (120 + Math.random()*80) + "px";
        scene.appendChild(g);
      }
      const c = div("ani-cloud"); c.style.left="100px"; scene.appendChild(c);
    }
    if (kind==="storm"){
      for (let i=0;i<2;i++){
        const l = div("ani-lightning");
        l.style.left = (80 + i*70) + "px";
        l.style.top = (58 + Math.random()*18) + "px";
        scene.appendChild(l);
      }
      const c1 = div("ani-cloud"); c1.style.left="65px";
      const c2 = div("ani-cloud"); c2.style.left="165px";
      scene.append(c1,c2);
    }
    if (kind==="rainbow"){
      scene.appendChild(div("ani-rainbow"));
      const c = div("ani-cloud"); c.style.left="80px"; scene.appendChild(c);
    }
    if (kind==="fog"){
      const f1 = div("ani-fog"); f1.style.top="70px";
      const f2 = div("ani-fog"); f2.style.top="98px";
      scene.append(f1,f2);
      const c = div("ani-cloud"); c.style.left="120px"; scene.appendChild(c);
    }
    if (kind==="night"){
      for (let i=0;i<18;i++){
        const s = div("ani-star");
        s.style.left = (18 + Math.random()*280) + "px";
        s.style.top = (18 + Math.random()*120) + "px";
        s.style.setProperty("--tw", (0.8 + Math.random()*1.2)+"s");
        scene.appendChild(s);
      }
      scene.appendChild(div("ani-moon"));
    }

    // guarantee ground exists (in case of extreme clears)
    if (!scene.querySelector(".ground")){
      scene.appendChild(div("ground"));
    }
  }

  function div(cls){ const d=document.createElement("div"); d.className=cls; return d; }

  function show(kind){
    const data = weatherText[kind];
    msg.textContent = data.t;
    encourage.textContent = encouragements[Math.floor(Math.random()*encouragements.length)];
    srFact.textContent = data.fact;
    drawWeather(kind);
    playChime();
    speak(data.t + " " + data.fact);
  }

  /* ---------- UI wiring ---------- */
  document.querySelectorAll(".weatherBtn").forEach(btn=>{
    btn.addEventListener("click", ()=> {
      const kind = btn.getAttribute("data-weather");
      if (kind) {
        show(kind);
        // if user taps, also set auto pointer to here
        autoIdx = weatherOrder.indexOf(kind);
        if (autoIdx < 0) autoIdx = 0;
      }
    }, {passive:true});
  });

  learnBtn.addEventListener("click", ()=>{
    speak("Let's explore weather together! You can visit NOAA SciJinks or PBS Kids Weather to play more weather games.");
    window.open("https://scijinks.gov/", "_blank", "noopener");
  });

  /* ---------- Auto-read cycle ---------- */
  function handleAuto(){
    if (autoTimer){ clearInterval(autoTimer); autoTimer=null; }
    if (!autoToggle.checked) return;
    autoTimer = setInterval(()=>{
      autoIdx = (autoIdx + 1) % weatherOrder.length;
      show(weatherOrder[autoIdx]);
    }, 4200); // gentle rhythm
  }

  // start state
  drawWeather("sun");
  msg.textContent = weatherText.sun.t;

  // kick off auto if saved
  handleAuto();

})();
</script>
</body>
</html>
