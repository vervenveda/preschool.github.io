<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The ABC Story Time</title>

<style>
body{
  font-family:"Comic Sans MS",system-ui,sans-serif;
  background:linear-gradient(180deg,#aef1ff,#fff9e8);
  text-align:center;
  margin:0;
}

.book{
  width:90%;
  max-width:700px;
  margin:40px auto;
  background:#fff;
  border-radius:24px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  padding:28px;
}

h1{font-size:2.2em;color:#3b7e41;margin-top:0;}
h2{font-size:1.6em;color:#d24b4b;margin-bottom:8px;}
p{font-size:1.3em;color:#444;line-height:1.6;}

.controls{
  margin-top:26px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

button{
  font-size:1.05em;
  background:#59b360;
  color:#fff;
  border:none;
  border-radius:14px;
  padding:10px 22px;
  cursor:pointer;
  transition:transform .15s,background .2s;
}
button:hover{background:#4aa454;transform:scale(1.05);}
button.active{background:#f39c12;}

.volume-control{
  margin:20px auto 0;
  width:60%;
}

select{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1em;
  margin-bottom:16px;
}

#pageIndicator{
  margin-top:10px;
  font-size:1em;
  color:#666;
}
</style>
</head>

<body>

<div class="book">
  <h1>The ABC Story Time</h1>

  <select id="storySelect">
    <option value="A">A — The Alligator</option>
    <!-- Add B–Z easily -->
  </select>

  <h2 id="storyTitle"></h2>
  <p id="pageText"></p>
  <div id="pageIndicator"></div>

  <div class="controls">
    <button id="prevBtn">⬅️ Back</button>
    <button id="readBtn">🔈 Read Aloud</button>
    <button id="nextBtn">Next ➡️</button>
  </div>

  <div class="volume-control">
    <label>Volume</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  </div>
</div>

<script>
/* =====================
   STORY DATA
===================== */
const STORIES = {
  A:{
    title:"A — The Alligator",
    pages:[
      "The alligator loves to eat his Alphabets for breakfast!",
      "The A is so good because it stands for Apples — and apples are crunchy and sweet!",
      "The alligator is full of apples and smiles happily. What a yummy day!"
    ]
  }
};

/* =====================
   STATE
===================== */
let currentStory="A";
let pageIndex=0;
let reading=false;

/* =====================
   ELEMENTS
===================== */
const storySelect=document.getElementById("storySelect");
const titleEl=document.getElementById("storyTitle");
const textEl=document.getElementById("pageText");
const indicatorEl=document.getElementById("pageIndicator");
const readBtn=document.getElementById("readBtn");
const volumeSlider=document.getElementById("volume");

/* =====================
   SPEECH
===================== */
const utterance=new SpeechSynthesisUtterance();
utterance.lang="en-US";
utterance.rate=1;
utterance.volume=1;

/* =====================
   RENDER
===================== */
function renderPage(){
  const story=STORIES[currentStory];
  titleEl.textContent=story.title;
  textEl.textContent=story.pages[pageIndex];
  indicatorEl.textContent=`Page ${pageIndex+1} of ${story.pages.length}`;

  speechSynthesis.cancel();
  if(reading) speak();
}

function speak(){
  const story=STORIES[currentStory];
  utterance.text=story.pages[pageIndex];
  speechSynthesis.speak(utterance);
}

/* =====================
   CONTROLS
===================== */
document.getElementById("nextBtn").addEventListener("click",()=>{
  const story=STORIES[currentStory];
  if(pageIndex<story.pages.length-1){
    pageIndex++;
    renderPage();
  }
});

document.getElementById("prevBtn").addEventListener("click",()=>{
  if(pageIndex>0){
    pageIndex--;
    renderPage();
  }
});

readBtn.addEventListener("click",()=>{
  reading=!reading;
  readBtn.classList.toggle("active",reading);
  reading ? speak() : speechSynthesis.cancel();
});

storySelect.addEventListener("change",e=>{
  currentStory=e.target.value;
  pageIndex=0;
  reading=false;
  readBtn.classList.remove("active");
  speechSynthesis.cancel();
  renderPage();
});

volumeSlider.addEventListener("input",e=>{
  utterance.volume=parseFloat(e.target.value);
});

/* =====================
   INIT
===================== */
renderPage();
</script>

</body>
</html>
