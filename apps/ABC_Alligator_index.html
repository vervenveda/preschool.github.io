<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌈 Alphabet Adventure Book</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

height:100vh;

font-family:'Comic Sans MS','Poppins',sans-serif;

display:flex;

flex-direction:column;

align-items:center;

background:

linear-gradient(
180deg,
#8ed8ff,
#c9f7d8,
#fff1b8
);

overflow:hidden;

}


/* HEADER */

header{

text-align:center;

padding:10px;

}

header h1{

margin:0;

font-size:34px;

color:#ff5f6d;

text-shadow:

3px 3px white;

}



/* MODE BUTTONS */


.mode-buttons button{

margin:8px;

padding:12px 22px;

border:none;

border-radius:30px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:

linear-gradient(
135deg,
#ff9a9e,
#fad0c4
);

color:white;

box-shadow:
0 5px 15px #999;

}



/* BOOK */


#book{

width:90%;

max-width:850px;

height:520px;

perspective:1500px;

position:relative;

}



.page{

position:absolute;

width:100%;

height:100%;

background:white;

border-radius:30px;

padding:35px;

text-align:center;

box-shadow:

0 15px 35px rgba(0,0,0,.25);

border:

8px solid #ffd166;

}



.page h2{

font-size:34px;

color:#5b4bdb;

}



.page p{

font-size:22px;

line-height:1.5;

color:#555;

}



.letter{

font-size:150px;

font-weight:bold;

color:#ff5757;

animation:bounce 2s infinite;

text-shadow:

5px 5px #ffd166;

}



.character{

font-size:100px;

}



.object{

font-size:80px;

}



@keyframes bounce{

50%{

transform:translateY(-20px);

}

}




/* CONTROLS */


.controls{

margin-top:20px;

}



.controls button{

padding:14px 25px;

margin:5px;

border:none;

border-radius:30px;

background:#69c57e;

color:white;

font-size:18px;

cursor:pointer;

}



/* PARTICLES */


.sparkle{

position:absolute;

font-size:30px;

animation:float 3s infinite;

}



@keyframes float{

100%{

transform:

translateY(-300px)
rotate(360deg);

opacity:0;

}

}



@media(max-width:600px){

#book{

height:450px;

}

.page p{

font-size:17px;

}

}



</style>

</head>


<body>


<header>

<h1>
🌈 Alphabet Adventure Book
</h1>


<div class="mode-buttons">

<button onclick="learnMode()">
📘 Learn Letters
</button>

<button onclick="adventureMode()">
✨ Create Adventure
</button>


</div>

</header>



<div id="book">


<div class="page">


<div id="content">

</div>


</div>


</div>



<div class="controls">

<button onclick="previousLetter()">
⬅ Back
</button>


<button onclick="readStory()">
🔊 Read
</button>


<button onclick="nextLetter()">
Next ➡
</button>


</div>





<script>


const alphabet=[

},

},

{

},

{

},

{

},

{

object:"Flower",
objectEmoji:"🌸",
setting:"Firefly Forest",
fact:"Foxes have excellent hearing."
},

{
letter:"G",
character:"Giraffe",
emoji:"🦒",
object:"Grapes",
objectEmoji:"🍇",

fact:"Giraffes have very long necks."
},

{
letter:"H",
character:"Hedgehog",
emoji:"🦔",

objectEmoji:"🍯",
setting:"Honey Grove",
fact:"Hedgehogs have protective spines."
},

{
letter:"I",
character:"Iguana",
emoji:"🦎",
object:"Island",
objectEmoji:"🏝️",

fact:"Iguanas enjoy warm sunshine."
},

{
letter:"J",
character:"Jellyfish",
emoji:"🪼",
object:"Jewel",
objectEmoji:"💎",
setting:"Jade Ocean",
fact:"Jellyfish have lived for millions of years."
},

{
letter:"K",
character:"Kangaroo",
emoji:"🦘",
object:"Kite",
objectEmoji:"🪁",
setting:"Kite Valley",
fact:"Kangaroos hop using powerful legs."
},

{
letter:"L",
character:"Lion",
emoji:"🦁",

fact:"Lions live together in groups."
},

{
letter:"M",

emoji:"🐒",
object:"Mango",
objectEmoji:"🥭",
setting:"Moonlit Forest",
fact:"Monkeys are clever explorers."
},

{
letter:"N",
character:"Narwhal",
emoji:"🐋",
object:"Nest",
objectEmoji:"🪺",
setting:"Northern Sea",
fact:"Narwhals are ocean unicorns."
},

{
letter:"O",
character:"Owl",
emoji:"🦉",
object:"Orange",
objectEmoji:"🍊",
setting:"Oak Forest",
fact:"Owls can see well at night."
},

{
letter:"P",

emoji:"🐧",

},

{

},

{

},

{

},

{
letter:"T",

},

{
letter:"U",
character:"Unicorn",
emoji:"🦄",
object:"Umbrella",
objectEmoji:"☂️",

fact:"Unicorns are magical story creatures."
},

{
letter:"V",
character:"Vulture",
emoji:"🦅",

setting:"Violet Valley",

},

{
letter:"W",
character:"Wolf",
emoji:"🐺",

fact:"Wolves are social animals."
},

{
letter:"X",
character:"X-Ray Fish",
emoji:"🐟",

objectEmoji:"🎵",
setting:"Xenon Ocean",
fact:"X-ray fish have see-through bodies."
},

{
letter:"Y",
character:"Yak",
emoji:"🐂",
object:"Yarn",
objectEmoji:"🧶",
setting:"Yellow Valley",
fact:"Yaks have thick warm fur."
},

{
letter:"Z",
character:"Zebra",
emoji:"🦓",
object:"Zinnia",
objectEmoji:"🌺",
setting:"Zebra Plains",
fact:"Every zebra has unique stripes."
}

];



let current=0;


let mode="learn";



function showLetter(data){


document.getElementById("content").innerHTML=`

<div class="letter">
${data.letter}
</div>


<div class="character">
${data.emoji}
</div>


<h2>
${data.letter} is for ${data.character}
</h2>


<p>
The ${data.character} explored 
<b>${data.setting}</b>
and discovered a magical ${data.object}.
</p>


<div class="object">
${data.objectEmoji}
</div>


<p>
${data.fact}
</p>

`;


createSparkles();


}



function learnMode(){

mode="learn";

showLetter(alphabet[current]);

}



function adventureMode(){


const data=
alphabet[Math.floor(Math.random()*alphabet.length)];


document.getElementById("content").innerHTML=`

<div class="character">
${data.emoji}
</div>


<h2>
✨ ${data.character}'s Adventure
</h2>


<p>

The ${data.character}
wandered through
<b>${data.setting}</b>

and discovered a magical
${data.object}.

</p>


<div class="object">
${data.objectEmoji}
</div>


<p>
${data.letter} is for ${data.character}!
</p>

`;


createSparkles();

}



function nextLetter(){

if(current<25){

current++;

}

showLetter(alphabet[current]);

}



function previousLetter(){

if(current>0){

current--;

}

showLetter(alphabet[current]);

}




function readStory(){

let text=
document.getElementById("content")
.innerText;


speechSynthesis.speak(

new SpeechSynthesisUtterance(text)

);

}



function createSparkles(){

for(let i=0;i<8;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*90+"%";

s.style.bottom="0";

document.body.appendChild(s);


setTimeout(()=>s.remove(),3000);

}

}



showLetter(alphabet[0]);


</script>


</body>
</html>
}
