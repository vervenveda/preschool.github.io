<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alphabet Fun A–Z</title>

<style>
  body {
    font-family: "Comic Sans MS", system-ui, sans-serif;
    background: linear-gradient(135deg, #d4f1f9, #ffe1f0);
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  h1 { color: #ff6f61; }

  #letter {
    font-size: 5rem;
    color: #6a5acd;
    animation: pop 0.3s ease;
  }

  #word {
    font-size: 2rem;
    color: #ff8c00;
    margin-bottom: 10px;
  }

  @keyframes pop {
    from { transform: scale(0.8); }
    to { transform: scale(1); }
  }

  button {
    font-size: 1.1rem;
    padding: 10px 16px;
    margin: 5px;
    border: none;
    border-radius: 12px;
    background: #81d4fa;
    color: #fff;
    cursor: pointer;
  }

  button:hover { background: #4fc3f7; }

  .icons, .dropzone {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 15px 0;
    flex-wrap: wrap;
  }

  .icon {
    font-size: 2rem;
    cursor: grab;
    animation: bounce 0.4s ease;
  }

  @keyframes bounce {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  .dropzone {
    border: 3px dashed #aaa;
    border-radius: 14px;
    padding: 20px;
    min-height: 60px;
    background: #fff;
  }

  #reward {
    font-size: 1.5rem;
    color: #4caf50;
    margin-top: 10px;
  }

  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall 2s linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
  }
</style>
</head>

<body>

<h1>🔤 Learn the Alphabet! 🔤</h1>

<div id="letter">A</div>
<div id="word">A is for Apple 🍎</div>

<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
<button onclick="speak()">🔊 Say It</button>

<hr>

<h2>🎮 Drag the Matching Letter</h2>
<div class="icons" id="choices"></div>
<div class="dropzone" id="dropzone">Drop Here</div>

<hr>

<h2>🧠 Quiz</h2>
<p id="quizText"></p>
<div id="quizBtns"></div>

<div id="reward"></div>

<script>
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const words = [
  "Apple 🍎","Ball ⚽","Cat 🐱","Dog 🐶","Elephant 🐘","Fish 🐟",
  "Grapes 🍇","Hat 🎩","Ice Cream 🍦","Juice 🧃","Kite 🪁","Lion 🦁",
  "Moon 🌙","Nest 🪺","Orange 🍊","Pig 🐷","Queen 👑","Rabbit 🐰",
  "Sun ☀️","Tree 🌳","Umbrella ☂️","Violin 🎻","Whale 🐳",
  "Xylophone 🎶","Yarn 🧶","Zebra 🦓"
];

let index = 0;
let progress = JSON.parse(localStorage.getItem("alphabetProgress")) || {};

const letterEl = document.getElementById("letter");
const wordEl = document.getElementById("word");
const choices = document.getElementById("choices");
const dropzone = document.getElementById("dropzone");
const rewardEl = document.getElementById("reward");

function render() {
  const letter = alphabet[index];
  letterEl.textContent = letter;
  wordEl.textContent = `${letter} is for ${words[index]}`;
  rewardEl.textContent = "";
  dropzone.textContent = "Drop Here";
  dropzone.innerHTML = "Drop Here";
  choices.innerHTML = "";

  const options = shuffle([
    letter,
    alphabet[Math.max(0, index - 1)],
    alphabet[Math.min(25, index + 1)]
  ]);

  options.forEach(l => {
    const el = document.createElement("div");
    el.textContent = l;
    el.className = "icon";
    el.draggable = true;
    el.ondragstart = e => e.dataTransfer.setData("text", l);
    choices.appendChild(el);
  });

  makeQuiz();
}

function next() {
  if (index < 25) index++;
  render();
}

function prev() {
  if (index > 0) index--;
  render();
}

/* 🔊 Letter + Phonics Audio */
function speak() {
  if ("speechSynthesis" in window) {
    const letter = alphabet[index];
    speechSynthesis.speak(
      new SpeechSynthesisUtterance(
        `${letter}. ${letter} says ${letter.toLowerCase()}`
      )
    );
  }
}

/* 🎯 Drag Match */
dropzone.ondragover = e => e.preventDefault();
dropzone.ondrop = e => {
  const l = e.dataTransfer.getData("text");
  if (l === alphabet[index]) win();
  else dropzone.textContent = "Try Again!";
};

/* 🧠 Quiz */
function makeQuiz() {
  const quizText = document.getElementById("quizText");
  const quizBtns = document.getElementById("quizBtns");
  quizBtns.innerHTML = "";
  quizText.textContent = `Which letter is "${alphabet[index]}"?`;

  shuffle([
    alphabet[index],
    alphabet[Math.floor(Math.random()*26)],
    alphabet[Math.floor(Math.random()*26)]
  ]).forEach(l => {
    const b = document.createElement("button");
    b.textContent = l;
    b.onclick = () => l === alphabet[index] ? win() : b.style.background="#ccc";
    quizBtns.appendChild(b);
  });
}

/* 🎉 Rewards */
function win() {
  progress[alphabet[index]] = true;
  localStorage.setItem("alphabetProgress", JSON.stringify(progress));
  rewardEl.textContent = "⭐ Awesome! ⭐";
  confetti();
}

function confetti() {
  for (let i = 0; i < 40; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,60%)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

render();
</script>

</body>
</html>
