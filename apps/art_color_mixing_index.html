<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pre-K Color Mixing Game</title>
<style>
  body {
    font-family: Comic Sans MS, sans-serif;
    text-align: center;
    background: linear-gradient(180deg, #6a5acd, #9370db);
    padding: 20px;
    color: #fff;
  }
  h1 {
    font-size: 40px;
    color: #FFD700;
    text-shadow: 3px 3px #444;
  }
  p {
    font-size: 20px;
  }
  .palette {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 30px auto;
  }
  .color-btn {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    border: 5px solid #FFD700;
    box-shadow: 4px 4px #444;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #mixBox {
    margin: 40px auto;
    width: 200px;
    height: 200px;
    border-radius: 20px;
    border: 5px solid #FFD700;
    background: #eee;
    box-shadow: 4px 4px #444;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    position: relative;
  }
  #result {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px #444;
  }
  .sound-toggle {
    margin-top: 20px;
    font-size: 18px;
  }

  /* Sparkle animation */
  @keyframes sparkle {
    0% { box-shadow: 0 0 8px #fff; transform: scale(1); }
    50% { box-shadow: 0 0 20px #fff, 0 0 40px currentColor; transform: scale(1.2); }
    100% { box-shadow: 0 0 8px #fff; transform: scale(1); }
  }
  #mixBox.sparkle {
    animation: sparkle 0.8s ease-in-out;
  }

  /* Confetti animation */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: currentColor;
    border-radius: 50%;
    pointer-events: none;
    opacity: 1;
    animation: confettiFall 1.2s forwards;
  }
  @keyframes confettiFall {
    to { transform: translate(var(--x, 0px), 120px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>
<h1>🎨 Color Mixing Game</h1>
<p>Drag one color onto another to see what happens!</p>

<div class="palette">
  <div class="color-btn" style="background:red" draggable="true" ondragstart="drag(event)" id="red">RED</div>
  <div class="color-btn" style="background:yellow; color:#444;" draggable="true" ondragstart="drag(event)" id="yellow">YELLOW</div>
  <div class="color-btn" style="background:blue" draggable="true" ondragstart="drag(event)" id="blue">BLUE</div>
</div>

<div id="mixBox" ondrop="drop(event)" ondragover="allowDrop(event)">?</div>
<div id="result">Pick two colors!</div>

<div class="sound-toggle">
  <label>
    <input type="checkbox" id="soundSwitch" checked>
    🔊 Sound On/Off
  </label>
</div>

<!-- Audio elements -->
<audio id="sound-orange" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum.ogg"></audio>
<audio id="sound-purple" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="sound-green" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="sound-mix" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>
let firstColor = null;
let soundEnabled = true;

document.getElementById("soundSwitch").addEventListener("change", function() {
  soundEnabled = this.checked;
});

function allowDrop(ev) { ev.preventDefault(); }

function drag(ev) { ev.dataTransfer.setData("color", ev.target.id); }

function drop(ev) {
  ev.preventDefault();
  let color = ev.dataTransfer.getData("color");
  const box = document.getElementById("mixBox");

  if (!firstColor) {
    firstColor = color;
    document.getElementById("result").innerText = "Now drag a second color!";
  } else {
    let secondColor = color;
    let mix = mixColors(firstColor, secondColor);
    box.style.background = mix.color;
    box.innerText = "";
    document.getElementById("result").innerText = mix.text;

    // Sparkle & confetti for vivid colors
    if (mix.color === "#00FF00" || mix.color === "#9B30FF") {
      box.classList.add("sparkle");
      createConfetti(box, mix.color);
      setTimeout(()=>box.classList.remove("sparkle"), 800);
    }

    if (soundEnabled) {
      document.getElementById("sound-mix").play();
      if (mix.soundId) document.getElementById(mix.soundId).play();
    }

    firstColor = null;
  }
}

function mixColors(c1, c2) {
  const combos = {
    "red-yellow": {color: "#FFA500", text: "You made ORANGE! 🧡", soundId: "sound-orange"},
    "yellow-red": {color: "#FFA500", text: "You made ORANGE! 🧡", soundId: "sound-orange"},
    "red-blue": {color: "#9B30FF", text: "You made PURPLE! 💜", soundId: "sound-purple"},
    "blue-red": {color: "#9B30FF", text: "You made PURPLE! 💜", soundId: "sound-purple"},
    "blue-yellow": {color: "#00FF00", text: "You made GREEN! 💚", soundId: "sound-green"},
    "yellow-blue": {color: "#00FF00", text: "You made GREEN! 💚", soundId: "sound-green"}
  };
  return combos[`${c1}-${c2}`] || {color: "#eee", text: "Try again!", soundId: null};
}

function createConfetti(box, color) {
  const count = 15;
  for (let i = 0; i < count; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.background = color;
    c.style.left = (Math.random()*box.offsetWidth) + "px";
    c.style.top = "-10px";
    c.style.setProperty("--x", (Math.random()*60-30)+"px");
    box.appendChild(c);
    setTimeout(()=>c.remove(), 1200);
  }
}
</script>
</body>
</html>
